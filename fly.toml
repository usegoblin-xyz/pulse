# Pulse brain on Fly. Single machine — sessions and the rate-limiter are
# in-process, so do NOT scale horizontally. Deploy with: fly deploy --ha=false
app = "pulse-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
