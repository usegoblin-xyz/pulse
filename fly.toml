# Pulse brain on Fly. Single machine — sessions and the rate-limiter are
# in-process, so do NOT scale horizontally. Deploy with: fly deploy --ha=false
app = "pulse-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Always-warm: a demo link people click cold should start instantly, and it
  # avoids the boot race on the first /session-token call.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
